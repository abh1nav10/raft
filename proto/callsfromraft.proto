syntax = "proto3";

package raft.implementation.calls;

message AppendEntry {
  int64 term = 1;
  int32 leader_id = 2;
  int64 prev_log_index = 3;
  int64 prev_log_term = 4;
  repeated bytes entries = 5;
  int64 leader_commit_index = 6;
}

message AppendEntryResponse {
  int64 term = 1;
  bool success = 2;
}

message RequestforVote {
  int64 term = 1;
  int32 candidate_id = 2;
  int64 last_log_index = 3;
  int64 last_log_term = 4;
}

message RequestforVoteResponse {
  int64 term = 1;
  bool vote_granted = 2;
}

service ReqVote {
  rpc ReqforVote(RequestforVote) returns (RequestforVoteResponse) {}
}

service Entry {
  rpc AppendEntry(AppendEntry) returns (AppendEntryResponse) {}
}
